<style>

<div class="app">

<script>
const TOPIC = "Chaucer: The Merchant's Tale — Critical Voices";

const sections = [
  { id: 1, title: "Tolliver" },
  { id: 2, title: "Kitteridge" },
  { id: 3, title: "Jane Bathard-Smith" },
  { id: 4, title: "Tina Davidson" },
  { id: 5, title: "Natalie Hannah" },
  { id: 6, title: "Burger" },
  { id: 7, title: "Wagenknecht" },
  { id: 8, title: "Bowden" },
  { id: 9, title: "Bernard O'Donoghue" },
  { id: 10, title: "John M Fyler" },
  { id: 11, title: "Robert Edwards" },
  { id: 12, title: "John Thorne" },
  { id: 13, title: "Irwin" },
  { id: 14, title: "D.L Shores" },
  { id: 15, title: "Burnley" },
  { id: 16, title: "David Aers" },
  { id: 17, title: "Haskett" },
];

const cards = [

  // ===== 1. TOLLIVER =====
  {
    section: 1,
    question: "What is Tolliver's central thesis about the Merchant?",
    answer: `<span class="quote">Tolliver's central thesis: the Merchant is a <strong>misogynist</strong> whose bitterness toward women and marriage stems from his own emotional and perceptual <strong>"blindness"</strong>, and he <strong>projects this blindness onto January</strong>, the protagonist of his tale.</span>
<strong>Key Argument:</strong><ul>
<li>The Merchant's hatred of women is not objective truth — it is a <strong>product of his own marital disillusionment</strong>.</li>
<li>He <strong>creates January in his own image</strong>: both are blind to reality, both cling to illusions, and both refuse correction.</li>
<li>The tale is not just about January's foolishness — it is the Merchant <strong>unconsciously revealing his own flaws</strong> through his fiction.</li></ul>
<span class="link-quote"><strong>Link to text:</strong> The Merchant is himself in "dette" and hides behind a façade of prosperity — just as January hides behind fantasies of marital bliss. Both men depend on others not seeing the truth.</span>
<strong>Exam Use:</strong> Tolliver's thesis reframes the entire tale: it's not just a story about a foolish old man — it's a psychological self-portrait of the narrator. The Merchant "participates in the blindness of his creature January."`
  },
  {
    section: 1,
    question: "How does Tolliver use the theme of 'sight' and 'blindness' across the tale?",
    answer: `<span class="quote">"Through January's physical sight...the Merchant's dependence on others' blindness allows him to maintain his secrecy."</span>
<strong>Three Layers of Blindness:</strong><ul>
<li><strong>January's mental blindness</strong> — he cannot see the reality of his marriage, his age, or May's true nature. This <strong>parallels his later physical blinding</strong> by Fortune.</li>
<li><strong>The Merchant's emotional blindness</strong> — he cannot see that his bitter narration reveals more about <strong>himself</strong> than about women. He depends on others' blindness to maintain his "façade."</li>
<li><strong>May's blindness</strong> — in Tolliver's reading, May is also "blind" in that she is reduced to a commodity with no inner life the narrator cares to explore.</li></ul>
<span class="quote">"The Merchant is blind, January is blind, and in some ways, May is blind; however, <strong>the audience is not</strong>."</span>
<span class="link-quote"><strong>Link to text:</strong> When January is struck blind, the narrator calls it "sweet venom!" — an oxymoron. And May on her wedding night is "stille as stoon," only for January later to become "as blynd as is a stoon" — the stone motif tracks the inversion of who is truly blind.</span>
<strong>Exam Use:</strong> Tolliver argues the audience occupies a privileged position — we see what all the characters (and the narrator) cannot. This is Chaucer's dramatic irony at its deepest level.`
  },
  {
    section: 1,
    question: "What does Tolliver mean by calling May 'currency' and 'property'?",
    answer: `<span class="quote">"May is his <strong>property</strong>" / May is "<strong>currency</strong>"</span>
<strong>Analysis:</strong><ul>
<li>January has a strictly <strong>mercantile interest</strong> in May — he <strong>"buys her only to spend her for Heaven on earth."</strong></li>
<li>January <strong>"shops" for his bride</strong> by scouring the marketplace, "much like a merchant would comparison-shop to evaluate his options before purchasing a specific item."</li>
<li>The <strong>Chaucerian irony</strong> is devastating: the Merchant, of all people, <strong>should know the difference between an object's appearance and its actual worth</strong> — yet he (through January) is fooled by surfaces.</li>
<li>May is not a person in this economy — she is a <strong>commodity to be purchased, spent, and consumed</strong>.</li></ul>
<span class="link-quote"><strong>Link to text:</strong> January revolves women before him like goods in a "mirour" in the marketplace. He wants "many a fair shap and many a fair visage" — rhetorical balance that treats women as interchangeable merchandise. The "old boef / tendre veel" metaphor reduces May to meat for consumption.</span>
<strong>Exam Use:</strong> Tolliver connects the Merchant's profession to the tale's deepest critique — marriage as commercial transaction. The irony that a merchant cannot appraise true value is the tale's central joke.`
  },
  {
    section: 1,
    question: "How does Tolliver read the wax key episode as the tale's symbolic climax?",
    answer: `<span class="quote">"The wax impression of a key May gives her lover, Damyan, allows him into her garden unbeknownst to January. He is physically blind to Damyan's entrance and mentally blind to her adultery."</span>
<span class="quote">"When January <strong>treats [May] like wax</strong>, he is, in effect, trying also to <strong>convert her into coin, so as to spend her</strong>."</span>
<strong>Analysis:</strong><ul>
<li>Tolliver connects <strong>two wax images</strong>: January wants to mould May like "wex" (passive material) — but May uses actual wax to <strong>copy the key and betray him</strong>.</li>
<li>The wax that represents January's <strong>desire to control</strong> becomes the instrument of his <strong>loss of control</strong>.</li>
<li>January is <strong>physically blind</strong> to Damyan's entrance through the copied key, and <strong>mentally blind</strong> to what May is doing — double blindness.</li>
<li>May <strong>controls who sees her and when</strong> — the gaze is inverted. She is no longer the passive object in the "mirour."</li></ul>
<span class="link-quote"><strong>Link to text:</strong> "In warm wex hath emprented the clyket" — the "clicket" / "wicket" rhyme tracks the transfer of sexual power. The phallic key changes hands from January to Damyan via May's agency.</span>
<strong>Exam Use:</strong> Tolliver's wax reading is the most elegant critical link in the tale: commodity → control → rebellion, all expressed through a single material (wax).`
  },
  {
    section: 1,
    question: "What does Tolliver mean by 'the Merchant participates in the blindness of his creature January'?",
    answer: `<span class="quote">"The Merchant <strong>participates in the blindness of his creature January</strong> in not realizing the extent to which he is talking of his own sore in the tale."</span>
<span class="quote">"January serves as a <strong>vehicle for the Merchant</strong>, whose attitudes, opinions, and perceptions of women classify him undoubtedly as a motley-clad misogynist."</span>
<strong>Analysis:</strong><ul>
<li>The Merchant thinks he is telling a story about <strong>someone else's</strong> foolishness — but he is <strong>unconsciously confessing his own</strong>.</li>
<li>Both men are offered <strong>opportunities to adjust their visions</strong> — January by Justinus, the Merchant by the tale's own ironies — but <strong>both refuse correction</strong>. "The Merchant refuses correction for them both because it is he who fashions January's perceptions."</li>
<li>Each man is <strong>"convinced himself his disillusionment is the truth"</strong> — they mistake bitterness for wisdom.</li>
<li>The Merchant <strong>"becomes a misogynist because of his own emotional blindness, and eventually translates his hatred of women into a self-hatred."</strong></li></ul>
<span class="link-quote"><strong>Link to text:</strong> Justinus warns "ye shal nat plesen hire" — good advice actively rejected in favour of Placebo's flattery ("I consente and conferme everydeel"). The Merchant, narrating, cannot see that he too rejects the truth.</span>
<strong>Exam Use:</strong> This is Tolliver's most quotable insight. The Merchant is Chaucer's greatest unreliable narrator — a man who tells a story to condemn women but ends up condemning himself.`
  },

  // ===== 2. KITTERIDGE =====
  {
    section: 2,
    question: "What does Kitteridge mean by calling the tale 'a warning about recklessly undertaking the commitment of marriage'?",
    answer: `<span class="quote">"<strong>Fabliau is a warning about recklessly undertaking the commitment of marriage.</strong>"</span>
<strong>Analysis:</strong><ul>
<li>Kitteridge reads the tale primarily as a <strong>fabliau</strong> — a bawdy comic genre that teaches through humiliation and laughter.</li>
<li>The "warning" has <strong>two targets</strong>:<br>
— <strong>Januarie:</strong> humorously unrealistic expectations of marriage and inability to satisfy his wife.<br>
— <strong>The Merchant:</strong> his obsession with deceitful women, echoed by the Host in the epilogue ("sleightes and subtilitees").</li>
<li>The warning is not just "don't marry badly" — it's <strong>"don't marry recklessly,"</strong> i.e. without self-knowledge, without "avisement" (Justinus' advice).</li></ul>
<span class="link-quote"><strong>Link to text:</strong> Justinus explicitly warns "Don't take a wyf withouten avisement" — the tale dramatises what happens when this advice is ignored. The crude climax ("pullen up the smok, and in he throng") is pure fabliau punishment for January's delusions.</span>
<strong>Exam Use:</strong> Kitteridge grounds the tale in genre. Calling it a "fabliau warning" helps frame exam arguments about purpose — Chaucer uses comedy as moral instruction.`
  },
  {
    section: 2,
    question: "What does Kitteridge mean by 'a kind of human comedy' and the Canterbury context?",
    answer: `<span class="quote">"The tale is <strong>a kind of human comedy</strong>."</span>
<span class="quote">"We ought not merely to consider the general appropriateness of each tale to the character of the teller: we should also inquire whether the tale is not determined, to some extent, by the <strong>circumstances — by the situation at the moment</strong>, by something that another Pilgrim has said or done, by the turn of a discussion already under way."</span>
<strong>Analysis:</strong><ul>
<li><strong>"Human comedy"</strong> — the tale is comic not because it is trivial, but because it captures <strong>universal human folly</strong>: self-deception, lust, vanity, and the gap between what we want to believe and what is true.</li>
<li>Kitteridge insists we must read the tale <strong>within the Canterbury framework</strong> — it is a <strong>dramatic response</strong> to other pilgrims, not a standalone story.</li>
<li>The Merchant tells this tale because of <strong>his own situation</strong> (two months married, bitter, disillusioned) — the tale is shaped by the teller's emotional state.</li>
<li>This is the foundation of the <strong>"dramatic principle"</strong> in Chaucer criticism: tales are not just stories but <strong>performances</strong> by specific characters in specific moments.</li></ul>
<span class="link-quote"><strong>Link to text:</strong> The Host's epilogue proves Kitteridge's point — Harry Bailey responds to the tale by complaining about his own wife ("labbing shrewe"), showing the tale provokes personal reactions from its audience. The "discussion already under way" continues.</span>
<strong>Exam Use:</strong> Kitteridge's dramatic principle is foundational. Use it to argue that the Merchant's bitterness, not Chaucer's views, shapes the tale — the narrator matters as much as the narrative.`
  },

<span class="link-quote"><strong>Link to text:</strong> "Januarie" and "May" are allegorical names, but the "houndfish" simile and the "clicket"/"wicket" rhyme are grounded in physical, fabliau realism. The Merchant's forked beard is both a realistic detail and an Edenic serpent symbol. This duality is what O'Donoghue captures.</span>

<li>The <strong>"falsity"</strong> Burnley identifies is the gap between <strong>romantic vocabulary</strong> ("Venus' fire") and <strong>fabliau action</strong> (quick sex in a tree). Damyan is courtly love <strong>parodied</strong>.</li>
