let currentSection = 0;
let currentCard = 0;
let isFlipped = false;

function buildSectionNav() {
  const nav = document.getElementById('section-nav');
  nav.innerHTML = '';
  sections.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'sec-btn' + (i === 0 ? ' active' : '');
    btn.textContent = s.label;
    btn.onclick = () => selectSection(i);
    nav.appendChild(btn);
  });
}

function selectSection(idx) {
  currentSection = idx;
  currentCard = 0;
  isFlipped = false;
  document.querySelectorAll('.sec-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.getElementById('card').classList.remove('flipped');
  renderCard();
}

function renderCard() {
  const section = sections[currentSection];
  const cards = section.cards;
  const c = cards[currentCard];

  document.getElementById('section-title').textContent = section.label.toUpperCase();
  document.getElementById('front-section').textContent = section.label;
  document.getElementById('back-section').textContent = section.label;
  document.getElementById('card-question').textContent = c.q;
  document.getElementById('card-answer').innerHTML = c.a;
  document.getElementById('progress-text').textContent = `${currentCard + 1} / ${cards.length}`;

  const pct = ((currentCard + 1) / cards.length) * 100;
  document.getElementById('progress-bar').style.width = pct + '%';

  document.getElementById('btn-prev').disabled = currentCard === 0;
  document.getElementById('btn-next').disabled = currentCard === cards.length - 1;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card').classList.toggle('flipped', isFlipped);
}

function prevCard() {
  if (currentCard > 0) {
    currentCard--;
    isFlipped = false;
    document.getElementById('card').classList.remove('flipped');
    renderCard();
  }
}

function nextCard() {
  const cards = sections[currentSection].cards;
  if (currentCard < cards.length - 1) {
    currentCard++;
    isFlipped = false;
    document.getElementById('card').classList.remove('flipped');
    renderCard();
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight') nextCard();
  else if (e.key === 'ArrowLeft') prevCard();
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

buildSectionNav();
renderCard();
</script>
